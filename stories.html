<!-- stories.html - MY STORIES PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stories - Kazuki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f0;
            color: #333;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        h1 {
            font-size: 1.5rem;
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .story {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .story h2 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .story-date {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .story-content {
            line-height: 1.8;
            color: #444;
        }

        .story-content p {
            margin-bottom: 1rem;
        }

        /* Buy Me a Coffee */
        .bmc {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #FFDD00;
            color: #000;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .bmc:hover {
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .bmc {
                bottom: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="back-btn">← Back Home</a>
            <h1>📖 My Stories</h1>
            <div style="width: 80px;"></div>
        </div>
    </header>

    <div class="container">
        <!-- Story 1 -->
        <article class="story">
            <h2>First Story</h2>
            <div class="story-date">Written: March 5, 2026</div>
            <div class="story-content">
                <p>
                    [PASTE YOUR STORY HERE]
                </p>
                <p>
                    Add more paragraphs as needed...
                </p>
            </div>
        </article>

        <!-- Story 2 -->
        <article class="story">
            <h2>Another Story Title</h2>
            <div class="story-date">Written: March 5, 2026</div>
            <div class="story-content">
                <p>
                    [PASTE YOUR SECOND STORY HERE]
                </p>
            </div>
        </article>

        <!-- Add more stories by copying the article block above -->
    </div>

    <a href="https://buymeacoffee.com/zhykun" target="_blank" class="bmc">
        ☕ Coffee
    </a>
</body>
</html>
